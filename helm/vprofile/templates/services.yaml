apiVersion: v1
kind: Service
metadata:
  name: vproapp-service
spec:
  selector:
    app: vproapp
  ports:
  - port: {{ .Values.app.servicePort }}
    targetPort: {{ .Values.app.containerPort }}
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: vprodb
spec:
  selector:
    app: vprodb
  ports:
  - port: {{ .Values.db.servicePort }}
    targetPort: vprodb-port
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: vprocache01
spec:
  selector:
    app: vpromc
  ports:
  - port: {{ .Values.memcached.servicePort }}
    targetPort: vpromc-port
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: vpromq01
spec:
  selector:
    app: vpromq01
  ports:
  - port: {{ .Values.rabbitmq.servicePort }}
    targetPort: vpromq01-port
    protocol: TCP
  type: ClusterIP
