# Source: vprofile/templates/app-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vproapp
  labels:
    app: vproapp

spec:
  replicas: 1

  selector:
    matchLabels:
      app: vproapp

  template:
    metadata:
      labels:
        app: vproapp

    spec:

      containers:
        - name: vproapp
          image: 996818459618.dkr.ecr.us-east-1.amazonaws.com/vprofile_app_image:61018f8
          imagePullPolicy: Always

          ports:
            - name: vproapp-port
              containerPort: 8080

          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 200m
              memory: 256Mi

      initContainers:
        - name: init-mydb
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              until nslookup vprodb.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do
                echo waiting for mydb;
                sleep 2;
              done;

        - name: init-memcache
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              until nslookup vprocache01.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do
                echo waiting for memcache;
                sleep 2;
              done;
---
# Source: vprofile/templates/db-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vprodb
  labels:
    app: vprodb

spec:
  replicas: 1

  selector:
    matchLabels:
      app: vprodb

  template:
    metadata:
      labels:
        app: vprodb

    spec:

      containers:
        - name: vprodb
          image: vprocontainers/vprofiledb:latest

          ports:
            - name: vprodb-port
              containerPort: 3306

          resources:
            limits:
              cpu: "1"
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 1Gi

          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: release-name-app-secret
                  key: db-pass

          volumeMounts:
            - name: vpro-db-data
              mountPath: /var/lib/mysql

      volumes:
        - name: vpro-db-data
          persistentVolumeClaim:
            claimName: db-pv-claim

      initContainers:
        - name: busybox
          image: busybox:latest
          command:
            - sh
            - -c
            - rm -rf /var/lib/mysql/lost+found

          volumeMounts:
            - name: vpro-db-data
              mountPath: /var/lib/mysql
